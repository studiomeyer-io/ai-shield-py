target-version = "py310"
line-length = 100
src = ["src", "tests"]

[lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "SIM", # flake8-simplify
  "RUF", # ruff-specific
  "UP",  # pyupgrade
  "N",   # pep8-naming
]
ignore = [
  "E501",  # line-length handled by formatter
  "B008",  # function-call-in-default-argument (Pydantic Field)
]

[lint.per-file-ignores]
# Tests deliberately use ambiguous-unicode (homoglyphs, full-width, math-bold)
# to verify normalize() collapses them. RUF001/RUF002/RUF003 are noise here.
"tests/**/*.py" = ["B011", "S101", "RUF001", "RUF002", "RUF003"]
# heuristic.py contains a homoglyph map (Cyrillic/Greek -> ASCII) where the
# ambiguous-unicode chars are intentional dictionary keys — that's the feature.
"src/ai_shield/scanner/heuristic.py" = ["RUF001", "RUF002", "RUF003"]

[format]
quote-style = "double"
indent-style = "space"
