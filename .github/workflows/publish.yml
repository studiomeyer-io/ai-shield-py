name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      # PyPI project name: studiomeyer-aishield (renamed from ai-shield
      # in v0.1.0 because Bosch's aishield@0.1.7 blocked the simpler name).
      # Trusted Publisher OIDC matches *this* URL — keep them in sync.
      url: https://pypi.org/p/studiomeyer-aishield
    permissions:
      id-token: write     # Trusted Publishing OIDC
      contents: read
      attestations: write # Sigstore attestations

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest -q

      - name: Build sdist + wheel
        run: uv build

      - name: Generate Sigstore attestations
        # v2 is the current major (mcp-armor S988 also pinned to v2).
        # v1 still works but emits deprecation warnings as of GHA Q1 2026.
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Publish to PyPI (Trusted Publishing OIDC, preferred)
        id: publish-trusted
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          skip-existing: true

      - name: Publish to PyPI (Token fallback if Trusted Publisher not yet set up)
        if: steps.publish-trusted.outcome != 'success'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          # `--skip-existing`: a manual `twine upload` before the tag-push
          # must not paint the workflow red (S991 race fix — happened on
          # v0.1.1 publish). Token via env-var, not CLI arg.
          uv run twine upload dist/* --skip-existing
