name: CI

on:
  push:
    branches: [main, builder/**]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy strict
        run: uv run mypy src/ai_shield

      - name: Pytest
        run: uv run pytest --cov=ai_shield --cov-report=term-missing --cov-fail-under=90

      - name: Build sdist + wheel
        run: uv build

      - name: Twine check (validates README rendering on PyPI)
        # twine is in [project.optional-dependencies] dev — fixed in
        # v0.1.1. v0.1.0 had this step but no twine in deps, so CI was
        # red on every push.
        run: uv run twine check dist/*
